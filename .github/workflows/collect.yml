name: Collect

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      collect_since:
        description: 'Backfill start date (e.g. 2025-01-01). Leave empty for normal incremental run.'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to create/update GitHub Releases
    env:
      OSSDIVE_DB: ${{ github.workspace }}/ossdive.db

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Download latest DB
        run: gh release download db-latest --pattern ossdive.db || echo "No existing release — starting fresh"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect
        run: bun run collect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COLLECT_SINCE: ${{ github.event.inputs.collect_since }}

      - name: Backfill hn_created_at (legacy rows)
        run: bun run backfill:hn-dates

      - name: Upload DB to Releases
        run: |
          gh release delete db-latest --cleanup-tag --yes 2>/dev/null || true
          gh release create db-latest ossdive.db \
            --title "DB $(date -u '+%Y-%m-%d %H:%M') UTC" \
            --notes "Auto-updated every 6 hours by GitHub Actions." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
