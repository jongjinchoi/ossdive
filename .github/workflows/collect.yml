name: Collect

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      collect_since:
        description: 'Backfill start date (e.g. 2025-01-01). Leave empty for normal incremental run.'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to create/update GitHub Releases
    env:
      OSSDIVE_DB: ${{ github.workspace }}/ossdive.db

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Download latest DB
        run: |
          set -euo pipefail

          if ! gh release view db-latest >/dev/null 2>&1; then
            echo "No existing release — starting fresh"
            exit 0
          fi

          ASSET="$(gh release view db-latest --json assets --jq '.assets | map(select((.name | startswith("ossdive-")) and (.name | endswith(".db")))) | sort_by(.updatedAt) | last | .name // ""')"
          if [ -n "$ASSET" ]; then
            gh release download db-latest --pattern "$ASSET" --output ossdive.db
          else
            gh release download db-latest --pattern ossdive.db --output ossdive.db || echo "No existing DB asset — starting fresh"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect
        run: bun run collect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COLLECT_SINCE: ${{ github.event.inputs.collect_since }}

      - name: Upload DB to Releases
        run: |
          set -euo pipefail

          ASSET="ossdive-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.db"
          cp ossdive.db "$ASSET"

          if ! gh release view db-latest >/dev/null 2>&1; then
            gh release create db-latest \
              --title "DB latest" \
              --notes "Auto-updated every 6 hours by GitHub Actions." \
              --latest=false
          fi

          gh release upload db-latest "$ASSET"
          gh release edit db-latest \
            --title "DB $(date -u '+%Y-%m-%d %H:%M') UTC" \
            --notes "Latest DB asset: $ASSET"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
