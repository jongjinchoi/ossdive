name: Collect

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to create/update GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Download latest DB
        run: gh release download db-latest --pattern ossriff.db || echo "No existing release — starting fresh"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect
        run: bun run collect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DB to Releases
        run: |
          gh release delete db-latest --cleanup-tag --yes 2>/dev/null || true
          gh release create db-latest ossriff.db \
            --title "DB $(date -u '+%Y-%m-%d %H:%M') UTC" \
            --notes "Auto-updated every 6 hours by GitHub Actions." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
