<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- #111 rounded square — rx=225 matches macOS icon squircle proportions -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" fill="#111111"/>
  <!-- submarine: centered on rotated bbox center (28.85,32.14), scale 12x -->
  <g transform="translate(166,126) scale(12)">
    <g transform="rotate(30,32,26)">
      <!-- hull -->
      <path d="M10 33 C10 28 16 28 16 28 L48 28 Q56 28 56 33 Q56 39 48 39 L16 39 C10 39 10 33 10 33Z" fill="white"/>
      <!-- sail -->
      <path d="M24 28 L24 19 Q24 17 26 17 L36 17 Q38 17 38 19 L38 28Z" fill="white"/>
      <!-- periscope -->
      <line x1="36" y1="17" x2="36" y2="11" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <!-- propeller ring -->
      <circle cx="11" cy="33" r="3.5" fill="none" stroke="white" stroke-width="1.8"/>
      <line x1="11" y1="29.5" x2="11" y2="36.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="7.5" y1="33" x2="14.5" y2="33" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    </g>
  </g>
</svg>
